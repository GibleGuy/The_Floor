<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quixx - Dice Roller</title>
    <meta name="description" content="Quixx dice roller game with animated 6-sided dice">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Quixx</h1>
        <p class="subtitle">Roll the dice and let fate decide!</p>

        <div class="dice-container">
            <div class="dice white" id="white1">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="dice white" id="white2">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="dice red" id="red">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="dice yellow" id="yellow">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="dice blue" id="blue">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="dice green" id="green">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
        </div>

        <button class="roll-button" id="rollButton">
            <svg class="dice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1"></circle>
                <circle cx="15.5" cy="8.5" r="1"></circle>
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="8.5" cy="15.5" r="1"></circle>
                <circle cx="15.5" cy="15.5" r="1"></circle>
            </svg>
            Roll Dice
        </button>

        <div class="results" id="results">
            <div class="result-item">
                <span class="result-label">White 1:</span>
                <span class="result-value" id="result-white1">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">White 2:</span>
                <span class="result-value" id="result-white2">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Red:</span>
                <span class="result-value" id="result-red">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Yellow:</span>
                <span class="result-value" id="result-yellow">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Blue:</span>
                <span class="result-value" id="result-blue">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Green:</span>
                <span class="result-value" id="result-green">-</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
